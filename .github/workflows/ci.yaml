name: CI

on:
  push:
    branches:
      - main
  pull_request: ~
  workflow_dispatch: ~

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: frankenphp_dev
          load: true
          tags: app-php-dev:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start services
        run: docker compose up -d --wait

      - name: Check HTTP reachability
        run: curl -fksSL https://localhost

      - name: Check Symfony console
        run: docker compose exec php php bin/console -V

      - name: Lint container
        run: |
          docker compose exec php php bin/console lint:container
          docker compose exec php php bin/console lint:yaml config --parse-tags

      - name: Run PHPUnit
        run: docker compose exec php php bin/phpunit
        continue-on-error: true

      - name: Stop services
        if: always()
        run: docker compose down

  prod-build:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build prod image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: frankenphp_prod
          tags: app-php-prod:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
